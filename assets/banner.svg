<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 360" width="1320" height="360" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2CA5E0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0f6fc"/>
      <stop offset="1" stop-color="#9ecbff"/>
    </linearGradient>
  </defs>

  <!-- framed card -->
  <rect x="3" y="3" width="1314" height="354" rx="28" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <rect x="3" y="3" width="1314" height="354" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>

  <!-- accent tile with a hub-and-spoke node mark -->
  <rect x="72" y="100" width="160" height="160" rx="36" fill="url(#accent)"/>
  <g stroke="#0d1117" stroke-width="9" stroke-linecap="round">
    <line x1="152" y1="180" x2="152" y2="128"/>
    <line x1="152" y1="180" x2="114" y2="226"/>
    <line x1="152" y1="180" x2="190" y2="226"/>
  </g>
  <g fill="#0d1117">
    <circle cx="152" cy="180" r="17"/>
    <circle cx="152" cy="124" r="12"/>
    <circle cx="114" cy="226" r="12"/>
    <circle cx="190" cy="226" r="12"/>
  </g>

  <!-- title -->
  <text x="276" y="176" font-size="88" font-weight="800" fill="url(#title)" letter-spacing="-1">vadana-node</text>

  <!-- divider -->
  <line x1="280" y1="208" x2="900" y2="208" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- subtitle -->
  <text x="282" y="265" font-size="32" fill="#8b949e" font-weight="500">Remote render worker &#183; mTLS, no proxy, no token</text>
</svg>
