# vadana-node worker. Put config.json + ca.crt + node.crt + node.key beside this
# file, then:  docker compose up -d --build
services:
  worker:
    # default: pull the prebuilt image (docker compose pull).  build: is a fallback
    # for local changes (docker compose up --build).
    image: ghcr.io/phoseinq/vadana-node:latest
    build:
      context: .
      # build over the host network so pip uses the same working route as the host
      # (the default bridge on some hosts can't reach pypi over IPv6)
      network: host
    container_name: vadana-node
    volumes:
      - ./config.json:/app/config.json:ro
      - ./ca.crt:/app/ca.crt:ro
      - ./node.crt:/app/node.crt:ro
      - ./node.key:/app/node.key:ro
    restart: unless-stopped
